apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-restore
  namespace: trombi
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pg-restore
          image: postgres:16
          envFrom:
            - secretRef:
                name: trombi-secrets
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eux
              LATEST=$(ls -t /backup/*.dump | head -1)
              echo "Restoring from $LATEST"
              PGPASSWORD="$POSTGRES_PASSWORD" pg_restore \
                -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                --clean --if-exists --no-owner --no-acl \
                "$LATEST"
              echo "Restore OK"
          volumeMounts:
            - name: backup
              mountPath: /backup
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: trombi-backup
